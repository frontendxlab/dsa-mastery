              - text: is one of easiest data structures to implement. We will learn how it works by considering some examples and will see its different implementations.
            - paragraph [ref=e78]: This is my first article on Leetcode, please give feedback or suggestion for any kind of improvement.
            - paragraph [ref=e79]: Lets start with the definition
            - paragraph [ref=e80]:
              - strong [ref=e81]: "What are Disjoint Sets:"
            - paragraph [ref=e82]: "Sets are called as Disjoint if:"
            - list [ref=e83]:
              - listitem [ref=e84]: Intersection of any two sets is NULL
            - paragraph [ref=e85]: DSU Data Structure have the same property as stated above and the union of all these disjoint sets is equal to entire set (universal set).
            - paragraph [ref=e86]:
              - emphasis [ref=e87]: "Consider a problem:"
              - text: "You are given several elements each element is a separate set initially. You want to do two kinds of operations:"
            - list [ref=e88]:
