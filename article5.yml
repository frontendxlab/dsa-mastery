            - paragraph [ref=e139]: "So far we have seen how actually combine function works, lets make it more clear by writing some code:"
            - paragraph [ref=e140]: "When we combine two sets, we actually combine the representative of their respective sets. So we need a way to find the representative of an element's set. Lets call that function be find(), which can be defined as:"
            - code [ref=e144]:
              - generic [ref=e145]: int find(int u)
              - generic [ref=e146]: "{"
              - generic [ref=e147]: if(u == representative[u])
              - generic [ref=e148]: return u;
              - generic [ref=e149]: else
              - generic [ref=e150]: return find(representative[u]);
              - generic [ref=e151]: "}"
            - paragraph [ref=e152]:
              - text: "Lets see if it works or not, currently the representative array looks like below:"
              - img "image" [ref=e153]
            - paragraph [ref=e154]:
              - text: "Suppose we call find(u) with u = d, then function call will be like below:"
              - text: representative[d] = c (c!=d) ,
              - text: representative[c] = a (a!=c) ,
              - text: representative[a] = e (e!=a) ,
              - text: representative[e] = g (g!=e) ,
              - text: representative[g] = g (g=g hence break)
              - text: return g
            - paragraph [ref=e155]: find(d) return g which is actually the representative of the set.
            - paragraph [ref=e156]: Now we have find() function ready we can combine two sets,
            - code [ref=e160]:
              - generic [ref=e161]: void combine (int u, int v)
              - generic [ref=e162]: "{"
              - generic [ref=e163]: u = find(u);
              - generic [ref=e164]: v = find(v);
              - generic [ref=e165]: if(u == v) // already in the same set so no action needed
              - generic [ref=e166]: return;
              - generic [ref=e167]: else
              - generic [ref=e168]: representative[v] = u;
              - generic [ref=e169]: "}"
            - paragraph [ref=e170]:
              - text: We are done with the DSU implementation, its that easy.
              - text: To check if two elements are in the same set or not just find their representative using find() and if they are same they belong to the same set.
            - paragraph [ref=e171]: "However our implementation is not much efficient, consider the below case:"
            - paragraph [ref=e172]:
