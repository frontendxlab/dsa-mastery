              - strong [ref=e176]: "Union by Size:"
            - paragraph [ref=e177]: We can rectify this problem, we just need to keep the height of the tree as minimum as possible.
            - paragraph [ref=e178]: Remember when we called combine(u,v) we always make u as the representative of v, however we could have done opposite as well. We can reduce the tree height by comparing the size of sets we are going to combine and always make the bigger set as the representative of the smaller.
            - paragraph [ref=e179]: "Following the above approach the tree after the above combine operations will look like below:"
