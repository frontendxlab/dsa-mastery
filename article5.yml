            - paragraph [ref=e94]: So as you can see initially all the elements are separate sets.
            - paragraph [ref=e95]: We will also assign a representative to each set, you can assume that this representative will be the point of contact of this set. Initially each element will be representative of themselves.
            - paragraph [ref=e96]:
              - text: For each element you can assume representative as the
              - strong [ref=e97]: immediate parent
              - text: of that element.
            - paragraph [ref=e98]:
