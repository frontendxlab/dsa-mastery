            - code [ref=e137]: ans += n − j
            - text: to count "this window + every longer window ending at or after j".
            - text: DON'T use
            - code [ref=e140]: ans += j − i + 1
            - text: in that scenario — that counts left-shrinking prefixes, a completely different set.
