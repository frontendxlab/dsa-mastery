          - generic [ref=e126]:
            - button "Copy" [ref=e127]
            - code [ref=e129]: "// When input has zeros, exact count can't be done by direct shrink. // Use: count(exactly k) = count(at most k) − count(at most k−1) const atMost = (goal) => { if (goal < 0) return 0; let i = j = ans = sum = 0; while (j < n) { sum += nums[j]; while (sum > goal) { sum -= nums[i]; i++; } ans += j - i + 1; // all subarrays ending at j with sum ≤ goal j++; } return ans; }; return atMost(k) - atMost(k - 1);"
