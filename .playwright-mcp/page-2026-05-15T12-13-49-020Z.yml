            - paragraph [ref=e2140]: Depth First Traversal is a traversal technique/algorithm, used to traverse through all the nodes in the given graph.
            - paragraph [ref=e2141]: It starts traversal through any one of its neighbour nodes and explores the farthest possible node in each path/branch and then starts Back-tracking.
            - paragraph [ref=e2142]: Backtracking happens when the DFS algorithm reaches a particular node that has no neighbours to visit further, once it reaches that node with no neighbours to be visited it’ll backtrack to its previous node (say N) and from this node N algorithm will start searching for unvisited neighbour nodes and starts visiting them.
