                    - row "★★★ Codeforces Codeforces is one of, if not, the most popular contest platforms out there. Currently maintained by Saratov State University, it features regular contests and countless awesome original problems. Additionally, every contest provides immediate helpful tutorials (usually) written by the authors themselves. Codeforces also houses a strong and engaging community. All in all, one would indeed learn and improve tremendously here." [ref=e827]:
                      - cell "★★★" [ref=e828]
                      - cell "Codeforces" [ref=e829]:
                        - link "Codeforces" [ref=e830] [cursor=pointer]:
                          - /url: http://codeforces.com/
                      - cell "Codeforces is one of, if not, the most popular contest platforms out there. Currently maintained by Saratov State University, it features regular contests and countless awesome original problems. Additionally, every contest provides immediate helpful tutorials (usually) written by the authors themselves. Codeforces also houses a strong and engaging community. All in all, one would indeed learn and improve tremendously here." [ref=e831]
                    - row "★★★ Topcoder Topcoder has been around since 2001. Rich in history, It's considered to be one of the most prestigious organizations when it comes to technology competitions. Hundreds of SRMs gave birth to an abundant problemset. Problems here are typically more challenging than others and Topcoder therefore appeals to many elite programmers. The annual Topcoder Open (TCO) is also a widely-discussed event." [ref=e832]:
                      - cell "★★★" [ref=e833]
                      - cell "Topcoder" [ref=e834]:
                        - link "Topcoder" [ref=e835] [cursor=pointer]:
                          - /url: https://www.topcoder.com/
                      - cell "Topcoder has been around since 2001. Rich in history, It's considered to be one of the most prestigious organizations when it comes to technology competitions. Hundreds of SRMs gave birth to an abundant problemset. Problems here are typically more challenging than others and Topcoder therefore appeals to many elite programmers. The annual Topcoder Open (TCO) is also a widely-discussed event." [ref=e836]
                    - row "★★★ Google Code Jam Google Code Jam is certainly one of the most highly-esteemed programming competitions. The competition consists of unique programming challenges which must be solved in a fixed amount of time. Competitors may use any programming language and development environment to obtain their solutions." [ref=e837]:
                      - cell "★★★" [ref=e838]
