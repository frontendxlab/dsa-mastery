                      - cell "Google Code Jam is certainly one of the most highly-esteemed programming competitions. The competition consists of unique programming challenges which must be solved in a fixed amount of time. Competitors may use any programming language and development environment to obtain their solutions." [ref=e841]
                    - row "★★★ AtCoder AtCoder is a new but phenomenal contest platform created by a team of highly-rated Japanese competitive programmers." [ref=e842]:
