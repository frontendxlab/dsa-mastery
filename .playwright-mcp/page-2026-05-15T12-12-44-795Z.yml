                    - generic [ref=e786]:
                      - paragraph [ref=e787]: I used to solve DP problems after DP problems without really it clicking in my head. I would see a solution and wonder "how the heck did they come with that solution..."
                      - paragraph [ref=e788]: Here is my practical guide to solving DP problems.
                      - list [ref=e789]:
                        - listitem [ref=e790]:
                          - paragraph [ref=e791]: The order of solving a dp problem should be 1) come up with a recurrence relation first 2) code it up. The first part only needs a pen and paper.
                        - listitem [ref=e792]:
                          - paragraph [ref=e793]:
                            - text: When coming up with a recurrence relation, separately come up with a general case and base cases.
                            - text: "**2.1 when coming up with a general case, assign well"
                            - emphasis [ref=e794]: defined English meaning
                            - text: to your dp term, dp[...][...][...]... e.g. for
                            - link "https://leetcode.com/problems/longest-increasing-subsequence/" [ref=e795] [cursor=pointer]:
                              - /url: https://leetcode.com/problems/longest-increasing-subsequence/
                            - text: ", dp[i] = the length of the longest increasing subsequence that ENDS on element i."
                            - text: "**2.2 once you define your meaning, express the answer to the original problem in terms of your dp terms. If you can't do this, then it means your dp definition likely lacks certain necessary information. e.g. for longest increasing subsequence, ans == max(dp[i]) for 0 <= i < n, n == length of an input array (because you don't know where an optimal solution ends)"
                            - text: "**2.3 base cases are usually straightforwardly defined if you follow the top-down approach. i.e. the conditions in which your recursive function ends. If your recursive function is stuck in an infinite loop, you are probably missing a base case (though it is possible your general case is messed up and creates a cycle. see my point 4)"
                        - listitem [ref=e796]:
                          - paragraph [ref=e797]: People usually prefer either the top-down or the bottom-up style. Stick with one or the other and always code in some template. Then, writing code is a matter of translating your recurrence relation. This way, you avoid mistakes.
                        - listitem [ref=e798]:
                          - paragraph [ref=e799]: At its core, DP problems are really graph problems. Here each dp[...][...][...] terms are nodes and edges are drawn based on recurrence relations. For your problem to have a DP solution, this graph MUST BE a DAG. This is usually what textbooks mean "optimal substructure". For me, this connection of DP to its graph representation greatly helped.
                        - listitem [ref=e800]:
                          - paragraph [ref=e801]: Once you "get" the solid understanding, then solve problems to find and internalize common patterns.
                      - paragraph [ref=e802]: To me, the practice of 2.1 and understanding of 4 were the tipping point. After that, DP became really easy for me and a weapon to solve many problems, that even have other solutions (usually greedy, which is harder to come up with)
