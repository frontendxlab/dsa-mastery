            - code [ref=e254]:
              - generic [ref=e255]: "class Solution {"
              - generic [ref=e256]: "int longestCommonSubsequenceUtil(string text1, string text2, int n, int m) {"
              - generic [ref=e257]: if (n == 0 || m == 0)
              - generic [ref=e258]: return 0;
              - generic [ref=e259]: vector<vector<int>>L(n+1, vector<int>(m+1, 0));
              - generic [ref=e260]: "for (int i = 0; i <= n; i++) {"
              - generic [ref=e261]: "for (int j = 0; j <= m; j++) {"
              - generic [ref=e262]: if (i == 0 || j == 0)
              - generic [ref=e263]: L[i][j] = 0;
              - generic [ref=e264]: else if (text1[i-1] == text2[j-1])
              - generic [ref=e265]: L[i][j] = 1 + L[i-1][j-1];
              - generic [ref=e266]: else
              - generic [ref=e267]: L[i][j] = max(L[i][j-1], L[i-1][j]);
              - generic [ref=e268]: "}"
              - generic [ref=e269]: "}"
              - generic [ref=e270]: return L[n][m];
              - generic [ref=e271]: "}"
              - generic [ref=e272]: "public:"
              - generic [ref=e273]: "int longestCommonSubsequence(string text1, string text2) {"
              - generic [ref=e274]: int n = text1.size();
              - generic [ref=e275]: int m = text2.size();
              - generic [ref=e276]: return longestCommonSubsequenceUtil(text1, text2, n, m);
              - generic [ref=e277]: "}"
              - generic [ref=e278]: "};"
