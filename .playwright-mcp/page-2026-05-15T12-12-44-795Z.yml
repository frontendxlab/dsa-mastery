            - code [ref=e196]:
              - generic [ref=e197]: "class Solution {"
              - generic [ref=e198]: "public:"
              - generic [ref=e199]: "bool canPartition(vector<int>& nums) {"
              - generic [ref=e200]: int n = nums.size();
              - generic [ref=e201]: int sum = 0;
              - generic [ref=e202]: for (int i = 0; i < n; i++)
              - generic [ref=e203]: sum += nums[i];
              - generic [ref=e204]: if (sum % 2 != 0) return false;
              - generic [ref=e205]: int target = sum/2;
              - generic [ref=e206]: vector<bool>dp(target+1, false);
              - generic [ref=e207]: dp[0] = true;
              - generic [ref=e208]: "for (int i = 0; i < n; i++) {"
              - generic [ref=e209]: "for (int j = target; j >= nums[i]; j--) {"
              - generic [ref=e210]: dp[j] = dp[j] | dp[j - nums[i]];
              - generic [ref=e211]: "}"
              - generic [ref=e212]: "}"
              - generic [ref=e213]: return dp[target];
              - generic [ref=e214]: "}"
              - generic [ref=e215]: "};"
            - paragraph [ref=e216]:
