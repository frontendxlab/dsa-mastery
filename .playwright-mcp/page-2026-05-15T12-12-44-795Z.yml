            - code [ref=e286]:
              - generic [ref=e287]: "class Solution {"
              - generic [ref=e288]: "public:"
              - generic [ref=e289]: "int minCut(string s) {"
              - generic [ref=e290]: int n = s.length();
              - generic [ref=e291]: int res[n];
              - generic [ref=e292]: bool P[n][n];
              - generic [ref=e293]: for (int i = 0; i < n; i++)
              - generic [ref=e294]: P[i][i] = true;
              - generic [ref=e295]: "for (int L = 2; L <= n; L++) {"
              - generic [ref=e296]: "for (int i = 0; i < n-L+1; i++) {"
              - generic [ref=e297]: int j = i+L-1;
              - generic [ref=e298]: "if (L == 2) {"
              - generic [ref=e299]: P[i][j] = (s[i] == s[j]);
              - generic [ref=e300]: "} else {"
              - generic [ref=e301]: P[i][j] = (s[i] == s[j]) && P[i+1][j-1];
              - generic [ref=e302]: "}"
              - generic [ref=e303]: "}"
              - generic [ref=e304]: "}"
              - generic [ref=e305]: "for (int i = 0; i < n; i++) {"
              - generic [ref=e306]: if (P[0][i])
              - generic [ref=e307]: res[i] = 0;
              - generic [ref=e308]: "else {"
              - generic [ref=e309]: res[i] = INT_MAX;
