          - generic [ref=e75]:
            - paragraph [ref=e76]: Hi All,
            - paragraph [ref=e77]:
              - text: I just completed my DP adventure which I started in last June and I would like to share my findings in this post.
              - text: There are total 241 dp tagged problems in LeetCode as of Today, and 26 of them are locked so I only solved the public ones.
            - list [ref=e78]:
              - listitem [ref=e79]: First of all, I participated the monthly challange April & May, so this really helped me to build a habbit of daily problem solving
              - listitem [ref=e80]:
                - text: Then I started to solve DP problems and kept updating my monthly problem list here.
                - link "https://leetcode.com/discuss/general-discussion/665187/everyday-dp-challenge-list" [ref=e81] [cursor=pointer]:
                  - /url: https://leetcode.com/discuss/general-discussion/665187/everyday-dp-challenge-list
              - listitem [ref=e82]: The average pace was about 1 problem per day.
              - listitem [ref=e83]:
                - text: I read these great articles to learn the general dynamic programming knowledge & patterns
                - link "https://leetcode.com/discuss/general-discussion/458695/Dynamic-Programming-Patterns" [ref=e84] [cursor=pointer]:
                  - /url: https://leetcode.com/discuss/general-discussion/458695/Dynamic-Programming-Patterns
                - link "https://leetcode.com/discuss/general-discussion/662866/DP-for-Beginners-Problems-or-Patterns-or-Sample-Solutions" [ref=e85] [cursor=pointer]:
                  - /url: https://leetcode.com/discuss/general-discussion/662866/DP-for-Beginners-Problems-or-Patterns-or-Sample-Solutions
            - paragraph [ref=e86]:
