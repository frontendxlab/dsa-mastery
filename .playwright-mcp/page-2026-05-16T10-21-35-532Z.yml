            - text: "Two window types exist:"
            - strong [ref=e80]: Fixed window
            - text: — the size k is given upfront, window is always exactly k wide.
            - strong [ref=e81]: Dynamic window
            - text: — the window grows and shrinks based on a condition (longest valid / shortest valid).
