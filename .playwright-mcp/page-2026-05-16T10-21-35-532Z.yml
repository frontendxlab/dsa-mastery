          - generic [ref=e116]: Fixed window (size k)
          - code [ref=e118]: "// Build first window, then slide let sum = 0; for (let i = 0; i < k; i++) sum += nums[i]; let maxSum = sum; for (let i = k; i < n; i++) { sum += nums[i]; // add incoming right element sum -= nums[i - k]; // remove outgoing left element maxSum = Math.max(maxSum, sum); }"
        - generic [ref=e119]:
          - generic [ref=e120]: Dynamic window — longest valid subarray
          - code [ref=e122]: "let i = 0, j = 0, ans = 0; while (j < n) { // 1. Expand: add nums[j] to window state state.add(nums[j]); // 2. Shrink: while window is invalid, remove from left while (!isValid(state)) { state.remove(nums[i]); i++; } // 3. Update answer with current valid window size ans = Math.max(ans, j - i + 1); j++; }"
        - generic [ref=e123]:
          - generic [ref=e124]: Count subarrays with EXACTLY k (the ans += n−j trick)
          - code [ref=e126]: "// When input has zeros, exact count can't be done by direct shrink. // Use: count(exactly k) = count(at most k) − count(at most k−1) const atMost = (goal) => { if (goal < 0) return 0; let i = j = ans = sum = 0; while (j < n) { sum += nums[j]; while (sum > goal) { sum -= nums[i]; i++; } ans += j - i + 1; // all subarrays ending at j with sum ≤ goal j++; } return ans; }; return atMost(k) - atMost(k - 1);"
        - generic [ref=e127]:
          - generic [ref=e128]: 🔑
          - generic [ref=e129]:
            - strong [ref=e130]: ans += n − j
            - text: vs
            - strong [ref=e131]: ans += j − i + 1
            - text: When the window [i..j] first becomes valid, ALL extensions to the right are also valid. Use
            - code [ref=e132]: ans += n − j
            - text: to count "this window + every longer window ending at or after j".
            - text: DON'T use
            - code [ref=e133]: ans += j − i + 1
            - text: in that scenario — that counts left-shrinking prefixes, a completely different set.
