        - paragraph [ref=e76]: "Every subarray problem at its core asks: \"find a contiguous part of the array that satisfies some condition.\" The brute force is always two nested loops — O(n²). Sliding window is the observation that you don't need to recompute from scratch for each starting point. You can maintain a running state and slide a window across the array, adding from the right and removing from the left."
