          - paragraph [ref=e85]: "Common terms you see when doing problems involving arrays:"
          - list [ref=e86]:
            - listitem [ref=e87]:
              - text: Subarray - A range of contiguous values within an array.
              - list [ref=e88]:
                - listitem [ref=e89]:
                  - text: "Example: given an array"
                  - code [ref=e90]: "[2, 3, 6, 1, 5, 4]"
                  - text: ","
                  - code [ref=e91]: "[3, 6, 1]"
                  - text: is a subarray while
                  - code [ref=e92]: "[3, 1, 5]"
                  - text: is not a subarray.
            - listitem [ref=e93]:
              - text: Subsequence - A sequence that can be derived from the given sequence by deleting some or no elements without changing the order of the remaining elements.
              - list [ref=e94]:
                - listitem [ref=e95]:
                  - text: "Example: given an array"
                  - code [ref=e96]: "[2, 3, 6, 1, 5, 4]"
                  - text: ","
                  - code [ref=e97]: "[3, 1, 5]"
                  - text: is a subsequence but
                  - code [ref=e98]: "[3, 5, 1]"
                  - text: is not a subsequence.
