              - /url: "#introduction"
              - text: "#"
          - paragraph [ref=e59]: Arrays hold values of the same type at contiguous memory locations. In an array, we're usually concerned about two things - the position/index of an element and the element itself. Different programming languages implement arrays under the hood differently and can affect the time complexity of operations you make to the array. In some languages like Python, JavaScript, Ruby, PHP, the array (or list in Python) size is dynamic and you do not need to have a size defined beforehand when creating the array. As a result, people usually have an easier time using these languages for interviews.
          - paragraph [ref=e60]: Arrays are among the most common data structures encountered during interviews. Questions which ask about other topics would likely involve arrays/sequences as well. Mastery of array is essential for interviews!
          - paragraph [ref=e61]:
            - strong [ref=e62]: Advantages
          - list [ref=e63]:
            - listitem [ref=e64]: Store multiple elements of the same type with one single variable name
            - listitem [ref=e65]:
              - text: Accessing elements is fast as long as you have the index, as opposed to
              - link "linked lists" [ref=e66] [cursor=pointer]:
                - /url: /algorithms/linked-list/
              - text: where you have to traverse from the head.
          - paragraph [ref=e67]:
            - strong [ref=e68]: Disadvantages
          - list [ref=e69]:
            - listitem [ref=e70]: Addition and removal of elements into/from the middle of an array is slow because the remaining elements need to be shifted to accommodate the new/missing element. An exception to this is if the position to be inserted/removed is at the end of the array.
            - listitem [ref=e71]: For certain languages where the array size is fixed, it cannot alter its size after initialization. If an insertion causes the total number of elements to exceed the size, a new array has to be allocated and the existing elements have to be copied over. The act of creating a new array and transferring elements over takes O(n) time.
