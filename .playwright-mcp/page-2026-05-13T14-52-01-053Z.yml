              - /url: "#techniques"
              - text: "#"
          - paragraph [ref=e151]: Note that because both arrays and strings are sequences (a string is an array of characters), most of the techniques here will apply to string problems.
          - heading "Sliding windowDirect link to Sliding window" [level=3] [ref=e152]:
            - text: Sliding window
            - link "Direct link to Sliding window" [ref=e153] [cursor=pointer]:
              - /url: "#sliding-window"
              - text: "#"
          - paragraph [ref=e154]:
            - text: Master the
            - link "sliding window technique" [ref=e155] [cursor=pointer]:
              - /url: https://leetcode.com/problems/minimum-window-substring/solutions/26808/here-is-a-10-line-template-that-can-solve-most-substring-problems/
            - text: "that applies to many subarray/substring problems. In a sliding window, the two pointers usually move in the same direction will never overtake each other. This ensures that each value is only visited at most twice and the time complexity is still O(n). Examples:"
            - link "Longest Substring Without Repeating Characters" [ref=e156] [cursor=pointer]:
              - /url: https://leetcode.com/problems/longest-substring-without-repeating-characters/
            - text: ","
            - link "Minimum Size Subarray Sum" [ref=e157] [cursor=pointer]:
              - /url: https://leetcode.com/problems/minimum-size-subarray-sum/
            - text: ","
            - link "Minimum Window Substring" [ref=e158] [cursor=pointer]:
              - /url: https://leetcode.com/problems/minimum-window-substring/
          - heading "Two pointersDirect link to Two pointers" [level=3] [ref=e159]:
            - text: Two pointers
            - link "Direct link to Two pointers" [ref=e160] [cursor=pointer]:
              - /url: "#two-pointers"
              - text: "#"
          - paragraph [ref=e161]:
            - text: "Two pointers is a more general version of sliding window where the pointers can cross each other and can be on different arrays. Examples:"
            - link "Sort Colors" [ref=e162] [cursor=pointer]:
              - /url: https://leetcode.com/problems/sort-colors/
            - text: ","
            - link "Palindromic Substrings" [ref=e163] [cursor=pointer]:
              - /url: https://leetcode.com/problems/palindromic-substrings/
          - paragraph [ref=e164]:
            - text: "When you are given two arrays to process, it is common to have one index per array (pointer) to traverse/compare the both of them, incrementing one of the pointers when relevant. For example, we use this approach to merge two sorted arrays. Examples:"
            - link "Merge Sorted Array" [ref=e165] [cursor=pointer]:
              - /url: https://leetcode.com/problems/merge-sorted-array/
          - heading "Traversing from the rightDirect link to Traversing from the right" [level=3] [ref=e166]:
            - text: Traversing from the right
            - link "Direct link to Traversing from the right" [ref=e167] [cursor=pointer]:
              - /url: "#traversing-from-the-right"
              - text: "#"
          - paragraph [ref=e168]:
            - text: "Sometimes you can traverse the array starting from the right instead of the conventional approach of from the left. Examples:"
            - link "Daily Temperatures" [ref=e169] [cursor=pointer]:
              - /url: https://leetcode.com/problems/daily-temperatures/
            - text: ","
            - link "Number of Visible People in a Queue" [ref=e170] [cursor=pointer]:
              - /url: https://leetcode.com/problems/number-of-visible-people-in-a-queue/
          - heading "Sorting the arrayDirect link to Sorting the array" [level=3] [ref=e171]:
            - text: Sorting the array
            - link "Direct link to Sorting the array" [ref=e172] [cursor=pointer]:
              - /url: "#sorting-the-array"
              - text: "#"
          - paragraph [ref=e173]: Is the array sorted or partially sorted? If it is, some form of binary search should be possible. This also usually means that the interviewer is looking for a solution that is faster than O(n).
          - paragraph [ref=e174]:
            - text: "Can you sort the array? Sometimes sorting the array first may significantly simplify the problem. Obviously this would not work if the order of array elements need to be preserved. Examples:"
            - link "Merge Intervals" [ref=e175] [cursor=pointer]:
              - /url: https://leetcode.com/problems/merge-intervals/
            - text: ","
            - link "Non-overlapping Intervals" [ref=e176] [cursor=pointer]:
              - /url: https://leetcode.com/problems/non-overlapping-intervals/
          - heading "PrecomputationDirect link to Precomputation" [level=3] [ref=e177]:
            - text: Precomputation
            - link "Direct link to Precomputation" [ref=e178] [cursor=pointer]:
              - /url: "#precomputation"
              - text: "#"
          - paragraph [ref=e179]:
            - text: "For questions where summation or multiplication of a subarray is involved, pre-computation using hashing or a prefix/suffix sum/product might be useful. Examples:"
            - link "Product of Array Except Self" [ref=e180] [cursor=pointer]:
              - /url: https://leetcode.com/problems/product-of-array-except-self/
            - text: ","
            - link "Minimum Size Subarray Sum" [ref=e181] [cursor=pointer]:
              - /url: https://leetcode.com/problems/minimum-size-subarray-sum/
            - text: ","
            - link "LeetCode questions tagged \"prefix-sum\"" [ref=e182] [cursor=pointer]:
              - /url: https://leetcode.com/problem-list/prefix-sum/
          - heading "Index as a hash keyDirect link to Index as a hash key" [level=3] [ref=e183]:
            - text: Index as a hash key
            - link "Direct link to Index as a hash key" [ref=e184] [cursor=pointer]:
              - /url: "#index-as-a-hash-key"
              - text: "#"
          - paragraph [ref=e185]:
            - text: "If you are given a sequence and the interviewer asks for O(1) space, it might be possible to use the array itself as a hash table. For example, if the array only has values from 1 to N, where N is the length of the array, negate the value at that index (minus one) to indicate presence of that number. Examples:"
            - link "First Missing Positive" [ref=e186] [cursor=pointer]:
              - /url: https://leetcode.com/problems/first-missing-positive/
            - text: ","
            - link "Daily Temperatures" [ref=e187] [cursor=pointer]:
              - /url: https://leetcode.com/problems/daily-temperatures/
          - heading "Traversing the array more than onceDirect link to Traversing the array more than once" [level=3] [ref=e188]:
            - text: Traversing the array more than once
            - link "Direct link to Traversing the array more than once" [ref=e189] [cursor=pointer]:
              - /url: "#traversing-the-array-more-than-once"
              - text: "#"
          - paragraph [ref=e190]: This might be obvious, but traversing the array twice/thrice (as long as fewer than n times) is still O(n). Sometimes traversing the array more than once can help you solve the problem while keeping the time complexity to O(n).
