          - list [ref=e138]:
            - listitem [ref=e139]: Clarify if there are duplicate values in the array. Would the presence of duplicate values affect the answer? Does it make the question simpler or harder?
            - listitem [ref=e140]: When using an index to iterate through array elements, be careful not to go out of bounds.
            - listitem [ref=e141]: Be mindful about slicing or concatenating arrays in your code. Typically, slicing and concatenating arrays would take O(n) time. Use start and end indices to demarcate a subarray/range where possible.
          - heading "Corner casesDirect link to Corner cases" [level=2] [ref=e142]:
