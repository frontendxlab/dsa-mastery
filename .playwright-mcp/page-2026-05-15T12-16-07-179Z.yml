            - paragraph [ref=e123]:
              - strong [ref=e124]: Problem Statement
              - text: Given array of prices, you can buy stock and sell it on a later date only once. Goal is to maximize profit.
            - paragraph [ref=e125]:
              - strong [ref=e126]: Intuition
              - text: The brute for solution would be finding all such possibilities of profit but the time complexity shoots to O(n^2) so this is rejected because it's possible to do it in O(n) time. Simply keep track of the local minima at each step and which traversing the array, find the difference between array element and local minima and return the max difference.
            - paragraph [ref=e127]:
