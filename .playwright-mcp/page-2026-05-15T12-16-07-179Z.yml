            - paragraph [ref=e143]:
              - strong [ref=e144]: Problem Statement
              - text: Given an array of non-negative integers nums, you are initially positioned at the first index of the array. Each element in the array represents your maximum jump length at that position. Determine if you are able to reach the last index.
            - paragraph [ref=e145]:
              - strong [ref=e146]: Intuition
              - text: We need to determine the farthest_index that can be reached while traversing the array. If the farthest_index is greater than or equal to the last index, we should return true else false. The time complexity will be O(N) and space complexity O(1).
