              - generic [ref=e177]: int r_new = 0;
              - generic [ref=e178]: for(int i = l; i <= r; i++) r_new = max(r_new, i + nums[i]);
              - generic [ref=e179]: l = r + 1;
              - generic [ref=e180]: r = r_new;
              - generic [ref=e181]: "}"
              - generic [ref=e182]: return step;
