            - paragraph [ref=e164]:
              - strong [ref=e165]: Problem Statement
              - text: Given an array of non-negative integers nums, you are initially positioned at the first index of the array. Each element in the array represents your maximum jump length at that position. Your goal is to reach the last index in the minimum number of jumps. You can assume that you can always reach the last index.
            - paragraph [ref=e166]:
              - strong [ref=e167]: Intuition
              - text: As soon as we see the word minimum number of steps, our aim should be to maximize our reach at every step thus giving the greedy solution of O(N) time. As soon as the right index where we reach is greater than or equal to our last index, we can safely return the step number.
            - paragraph [ref=e168]:
