            - paragraph [ref=e73]:
              - text: I've seen there are many amazing tutorials and problem lists out there for various Concepts like
              - link "Dynamic Programming" [ref=e74] [cursor=pointer]:
                - /url: https://leetcode.com/discuss/general-discussion/458695/Dynamic-Programming-Patterns
              - text: by @aatalyk. I plan on compiling one for Greedy in C++ so that it's helpful for me as well as people starting their interview preps. Java and Python solution can be found in the solution column of the questions. It's incomplete but feel free to suggest some resources which can benefit people while revising Greedy.
            - separator [ref=e75]
            - heading "Some Background" [level=4] [ref=e76]
            - paragraph [ref=e77]: Greedy algorithm is nothing but a paradigm which builds problems piece by piece. In recursion, we keep on dividing a big problem into multiple smaller chunks and solving those sub problems which is finally used to solve our actual problem. But this isn't the case for Greedy. In this, at any instant, we choose a piece of solution which will offer the most obvious and immediate benefit. For example the famous problem Fractional Knapsack. We keep on choosing the items which are local maximathat is, the items which have maximum value of "profit per unit weight" and in the end get the global maximum.
            - separator [ref=e78]
            - heading "Some popular Greedy Algorithms" [level=4] [ref=e79]
            - list [ref=e80]:
              - listitem [ref=e81]: Dijkstra’s Shortest Path
              - listitem [ref=e82]: Kruskal’s Minimum Spanning Tree (MST)
              - listitem [ref=e83]: Prim's Minimum Spanning tree
              - listitem [ref=e84]: Huffman Coding
            - separator [ref=e85]
            - heading "Problem List for Greedy" [level=4] [ref=e86]
