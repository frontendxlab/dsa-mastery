            - code [ref=e222]:
              - generic [ref=e223]: "class Solution {"
              - generic [ref=e224]: int dp[(1<<16) + 2];
              - generic [ref=e225]: "public:"
              - generic [ref=e226]: "bool canPartitionKSubsets(vector<int>& nums, int k) {"
              - generic [ref=e227]: int n = nums.size();
              - generic [ref=e228]: fill(dp, dp+(1<<16)+2, -1);
              - generic [ref=e229]: int sum = 0;
              - generic [ref=e230]: for (int i = 0; i < n; i++)
              - generic [ref=e231]: sum += nums[i];
              - generic [ref=e232]: if (sum % k != 0) return false;
              - generic [ref=e233]: int target = sum/k;
              - generic [ref=e234]: dp[0] = 0;
              - generic [ref=e235]: "for (int mask = 0; mask < (1<<n); mask++) {"
              - generic [ref=e236]: if (dp[mask] == -1) continue;
              - generic [ref=e237]: "for (int i = 0; i < n; i++) {"
              - generic [ref=e238]: if (!(mask & (1 << i)) && dp[mask] + nums[i] <= target)
              - generic [ref=e239]: dp[mask | (1 << i)] = (dp[mask] + nums[i]) % target;
              - generic [ref=e240]: "}"
              - generic [ref=e241]: "}"
              - generic [ref=e242]: return dp[(1<<n)-1] == 0;
              - generic [ref=e243]: "}"
              - generic [ref=e244]: "};"
