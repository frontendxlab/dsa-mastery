<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Mastery — Master DSA, one pattern at a time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
:root{
  --f:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  --bg:#06070d;--bg2:#0a0c18;--card:#0f1122;--hover:#141730;
  --nav-bg:rgba(6,7,13,0.87);
  --b:rgba(214,235,253,0.06);--b2:rgba(214,235,253,0.12);
  --t:#e8eaf0;--t2:#7d8299;--t3:rgba(232,234,240,0.28);
  --a:#3b9eff;--a-bg:rgba(59,158,255,0.09);--a-bdr:rgba(59,158,255,0.20);--a-glow:rgba(59,158,255,0.12);
  --easy:#34d399;--med:#fbbf24;--hard:#f87171;
  --r:8px;--rl:14px;--rp:9999px;
}
:root[data-theme="light"]{
  --bg:#f5f6fb;--bg2:#eef0f8;--card:#ffffff;--hover:#e8ecf6;
  --nav-bg:rgba(245,246,251,0.88);
  --b:rgba(0,0,51,0.07);--b2:rgba(0,0,51,0.13);
  --t:#0e0f14;--t2:#4b4f63;--t3:rgba(14,15,20,.36);
  --a:#1a6de0;--a-bg:rgba(26,109,224,0.08);--a-bdr:rgba(26,109,224,0.20);--a-glow:rgba(26,109,224,0.09);
  --easy:#059669;--med:#d97706;--hard:#dc2626;
}
body{font-family:var(--f);background:var(--bg);color:var(--t);line-height:1.6;overflow-x:hidden}
.w{max-width:1180px;margin:0 auto;padding:0 28px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;background:none;border:none;font-family:inherit;color:inherit}

/* LAYERS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#cursor-glow{position:fixed;width:420px;height:420px;border-radius:50%;pointer-events:none;z-index:1;
  background:radial-gradient(circle,rgba(59,158,255,.05) 0%,transparent 62%);
  transform:translate(-50%,-50%);filter:blur(12px)}
:root[data-theme="light"] #cursor-glow{background:radial-gradient(circle,rgba(26,109,224,.04) 0%,transparent 60%)}
.nav,.hero,.main,footer{position:relative;z-index:2}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;
  background:var(--nav-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--b);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 4px 32px rgba(0,0,0,.4)}
.nav-inner{height:100%;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-mark{display:flex;align-items:center;justify-content:center;width:28px;height:28px;
  background:var(--a);color:#fff;font-size:11px;font-weight:700;border-radius:7px;font-family:var(--fm);letter-spacing:-.5px;
  animation:logoPulse 4s ease-in-out infinite}
.logo-mark.sm{width:22px;height:22px;font-size:9px;border-radius:5px;animation:none}
@keyframes logoPulse{0%,100%{box-shadow:0 0 10px rgba(59,158,255,.3)}50%{box-shadow:0 0 22px rgba(59,158,255,.62)}}
.logo-name{font-size:14px;font-weight:600;letter-spacing:-.3px}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{padding:5px 12px;border-radius:6px;font-size:14px;font-weight:500;color:var(--t2);transition:all .15s}
.nav-link:hover,.nav-link.act{background:var(--hover);color:var(--t)}
.nav-end{display:flex;align-items:center;gap:4px;margin-left:auto}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r);color:var(--t2);transition:all .15s}
.icon-btn:hover{background:var(--hover);color:var(--t)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:80px 24px 40px;overflow:hidden}
.hero-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:1200px;height:820px;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 32%,rgba(59,158,255,.12) 0%,rgba(139,92,246,.06) 38%,transparent 64%);
  filter:blur(52px)}
.hero-dots{position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(214,235,253,.032) 1px,transparent 1px);
  background-size:28px 28px}

/* FLOATING SHAPES */
.fwrap{position:absolute;pointer-events:none;will-change:transform}
.finner{will-change:transform;transition:transform .15s ease-out}
@keyframes float1{0%,100%{transform:translateY(0) rotate(0deg)}45%{transform:translateY(-18px) rotate(2.5deg)}70%{transform:translateY(10px) rotate(-1.5deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}38%{transform:translateY(-14px) rotate(-3deg)}65%{transform:translateY(12px) rotate(2deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(0deg)}42%{transform:translateY(-20px) rotate(2deg)}72%{transform:translateY(8px) rotate(-2deg)}}
@keyframes float4{0%,100%{transform:translateY(0) rotate(0deg)}35%{transform:translateY(-13px) rotate(-2.5deg)}62%{transform:translateY(14px) rotate(1.5deg)}}
@keyframes float5{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(1.5deg)}68%{transform:translateY(7px) rotate(-3deg)}}

/* SVG DRAW LOOP — universal: stroke-dasharray 9999 always covers any path length */
.dl{stroke-dasharray:9999;stroke-dashoffset:9999;opacity:0;
  animation:loopDraw var(--dur,5s) var(--del,0s) ease-in-out infinite}
@keyframes loopDraw{
  0%,100%{stroke-dashoffset:9999;opacity:0}
  8%{opacity:1}
  42%{stroke-dashoffset:0;opacity:1}
  60%{stroke-dashoffset:0;opacity:.8}
  92%{opacity:0}
}

/* HERO CONTENT */
.hero-inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:28px;max-width:780px}
.hero-inner > *{opacity:0;animation:fadeUp .7s ease both}
.hero-inner > *:nth-child(1){animation-delay:.08s}
.hero-inner > *:nth-child(2){animation-delay:.18s}
.hero-inner > *:nth-child(3){animation-delay:.28s}
.hero-inner > *:nth-child(4){animation-delay:.36s}
.hero-inner > *:nth-child(5){animation-delay:.44s}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.announce-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px 6px 12px;
  background:var(--a-bg);border:1px solid var(--a-bdr);border-radius:var(--rp);
  font-size:13px;font-weight:500;color:var(--a);cursor:pointer;transition:background .15s}
.announce-badge:hover{background:rgba(59,158,255,.16)}
.adot{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0;animation:pulseDot 2.2s ease infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(59,158,255,.55)}60%{box-shadow:0 0 0 6px rgba(59,158,255,0)}}

.hero-title{font-size:clamp(48px,8.5vw,96px);font-weight:800;letter-spacing:-.046em;line-height:1.02;text-wrap:balance}
.hero-title .acc{
  background:linear-gradient(135deg,#3b9eff 0%,#a78bfa 45%,#3b9eff 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 5s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-title .dim{color:var(--t3)}
.hero-desc{font-size:clamp(15px,1.8vw,18px);color:var(--t2);max-width:480px;line-height:1.72}
.hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:var(--r);
  font-size:14px;font-weight:600;transition:all .22s;cursor:pointer;border:none;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--a);color:#fff;box-shadow:0 4px 20px rgba(59,158,255,.28)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(59,158,255,.46)}
.btn-outline{background:var(--card);color:var(--t);border:1px solid var(--b2)}
.btn-outline:hover{background:var(--hover);transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.3)}
.scroll-hint{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--t3);
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
.sline{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--a),transparent);
  animation:slineAnim 2.2s ease-in-out infinite}
@keyframes slineAnim{0%,100%{opacity:.3;transform:scaleY(.5)}55%{opacity:.9;transform:scaleY(1)}}

/* MARQUEE */
.marquee-shell{padding:18px 0;overflow:hidden;
  mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
.marquee-track{display:flex;gap:40px;animation:slideMarq 32s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--t3);white-space:nowrap;transition:color .2s}
.marquee-item:hover{color:var(--t2)}
.marquee-dot{width:3px;height:3px;border-radius:50%;background:var(--t3)}
@keyframes slideMarq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:36px 0}
.stat-card{background:var(--card);border:1px solid var(--b);border-radius:var(--rl);padding:28px 20px;
  text-align:center;transition:all .28s cubic-bezier(.23,1,.32,1);cursor:default;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(59,158,255,.07),transparent 55%);opacity:0;transition:opacity .3s;pointer-events:none}
.stat-card:hover::before{opacity:1}
.stat-card:hover{transform:translateY(-5px) scale(1.01);border-color:var(--a-bdr);
  box-shadow:0 18px 40px rgba(0,0,0,.4),0 0 0 1px var(--a-bdr)}
.stat-val{font-size:38px;font-weight:800;letter-spacing:-.04em;font-family:var(--fm)}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.07em}

/* SECTIONS */
.section{padding:72px 0}
.section-head{margin-bottom:44px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--a);margin-bottom:10px}
.section-title{font-size:clamp(24px,3.5vw,34px);font-weight:700;letter-spacing:-.025em}
.section-sub{font-size:15px;color:var(--t2);margin-top:8px;max-width:420px;line-height:1.65}
.sep{height:1px;background:linear-gradient(90deg,transparent,var(--b2),transparent)}

/* TOPIC CARDS */
.topics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.topic-card{padding:20px 18px 16px;background:var(--card);border:1px solid var(--b);border-radius:var(--rl);
  display:block;position:relative;overflow:hidden;
  transition:transform .28s cubic-bezier(.23,1,.32,1),box-shadow .28s,border-color .25s;will-change:transform;
  cursor:pointer}
.topic-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--tc,var(--a));transform:scaleY(0);transition:transform .25s cubic-bezier(.23,1,.32,1);border-radius:0 2px 2px 0}
.topic-card:hover::before{transform:scaleY(1)}
.topic-card::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 82% 15%,var(--tc-glow,transparent) 0%,transparent 58%);
  opacity:0;transition:opacity .3s;pointer-events:none}
.topic-card:hover::after{opacity:1}
.tsvg{position:absolute;top:14px;right:14px;opacity:.2;transition:opacity .3s,transform .35s cubic-bezier(.23,1,.32,1)}
.topic-card:hover .tsvg{opacity:.52;transform:scale(1.08) translateY(-2px)}
.tdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:10px}
.tname{font-size:14px;font-weight:600;margin-bottom:4px}
.tdesc{font-size:12px;color:var(--t2);line-height:1.56;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tmeta{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px}
.tcnt{color:var(--t2);font-weight:600;font-family:var(--fm)}

/* FEATURE CARDS */
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.feature-card{padding:26px;background:var(--card);border:1px solid var(--b);border-radius:var(--rl);
  transition:transform .28s cubic-bezier(.23,1,.32,1),box-shadow .28s,border-color .25s;will-change:transform}
.ficon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:var(--a-bg);border:1px solid var(--a-bdr);border-radius:10px;
  font-size:15px;color:var(--a);margin-bottom:14px;font-family:var(--fm);
  transition:transform .22s;flex-shrink:0}
.feature-card:hover .ficon{transform:scale(1.12) rotate(5deg)}
.fname{font-size:15px;font-weight:600;margin-bottom:6px}
.fdesc{font-size:13px;color:var(--t2);line-height:1.65}

/* CTA */
.cta-block{background:var(--card);border:1px solid var(--b);border-radius:18px;padding:72px 48px;
  text-align:center;position:relative;overflow:hidden}
.cta-glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 70% at 50% 0%,rgba(59,158,255,.11),transparent 65%)}
.cta-glow2{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 40% at 50% 100%,rgba(139,92,246,.07),transparent 65%)}
.cta-title{font-size:clamp(26px,4vw,44px);font-weight:800;letter-spacing:-.038em;margin-bottom:12px;position:relative}
.cta-desc{font-size:16px;color:var(--t2);margin-bottom:32px;position:relative}
.cta-actions{display:flex;justify-content:center;gap:12px;position:relative}

/* FOOTER */
.footer{border-top:1px solid var(--b);padding:48px 0 32px;margin-top:40px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:32px}
.footer-logo{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.footer-bn{font-size:14px;font-weight:600}
.footer-tag{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:14px;max-width:280px}
.footer-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:3px 9px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rp);font-size:11px;color:var(--t2);font-weight:500}
.fcol-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.flinks{display:flex;flex-direction:column;gap:9px}
.flink{font-size:13px;color:var(--t2);transition:color .15s}.flink:hover{color:var(--t)}
.footer-btm{padding-top:20px;border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t3)}
.footer-gh{color:var(--t2);display:flex;transition:color .15s}.footer-gh:hover{color:var(--t)}

/* ══════════════ THE SHAPE CODEX — OPEN BOOK ══════════════ */
.codex-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}

/* FLOATING STAGE */
.ob-stage{display:flex;align-items:center;justify-content:center;
  position:relative;min-height:360px;animation:obBob 6s ease-in-out infinite}
@keyframes obBob{
  0%,100%{transform:translateY(0) rotate(-.5deg)}
  50%{transform:translateY(-14px) rotate(.5deg)}
}
.ob-glow{position:absolute;width:380px;height:380px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(139,92,246,.16) 0%,transparent 68%);
  filter:blur(36px);top:50%;left:50%;transform:translate(-50%,-50%)}
.ob-scene{perspective:1300px;position:relative;z-index:1}

/* THE BOOK */
.ob-book{
  display:grid;grid-template-columns:204px 20px 204px;
  position:relative;
  transform:rotateX(16deg) rotateY(-10deg);
  transform-style:preserve-3d;
  border-radius:3px 6px 6px 3px;
  box-shadow:0 50px 90px rgba(0,0,0,.6),0 20px 40px rgba(0,0,0,.35),
    0 0 0 1px rgba(255,255,255,.03) inset;
  animation:obAppear .9s .2s cubic-bezier(.23,1,.32,1) both;
}
@keyframes obAppear{
  from{opacity:0;transform:rotateX(28deg) rotateY(-22deg) scale(.85)}
  to{opacity:1;transform:rotateX(16deg) rotateY(-10deg) scale(1)}
}

/* PAGE SURFACES */
.ob-left,.ob-right{height:286px;padding:22px 18px;position:relative;overflow:visible}
.ob-left{
  width:204px;
  background:linear-gradient(104deg,#f3eed8 0%,#f8f4e6 60%,#f0ebe0 100%);
  border-radius:3px 0 0 3px;
  box-shadow:inset -8px 0 16px rgba(0,0,0,.1)}
.ob-right{
  width:204px;
  background:linear-gradient(76deg,#f0ebe0 0%,#f8f4e6 40%,#f3eed8 100%);
  border-radius:0 5px 5px 0;
  box-shadow:inset 8px 0 16px rgba(0,0,0,.08)}

/* SPINE */
.ob-spine{
  width:20px;height:286px;
  background:linear-gradient(to right,#1a0434,#30065c,#1a0434);
  box-shadow:inset 2px 0 3px rgba(255,255,255,.06),inset -2px 0 5px rgba(0,0,0,.4)}

/* PAGE CONTENT TYPOGRAPHY */
.ob-ph{font-size:6.5px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(109,40,217,.65);margin-bottom:11px;padding-bottom:7px;
  border-bottom:1.5px solid rgba(109,40,217,.18);font-family:var(--fm)}
.ob-toc-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px}
.ob-toc-n{font-size:7.5px;color:rgba(109,40,217,.8);font-family:var(--fm);font-weight:700;min-width:16px;flex-shrink:0}
.ob-toc-t{font-size:8.5px;color:#1e0a38;font-weight:500;flex:1;line-height:1.2}
.ob-toc-d{flex:1;border-bottom:1px dotted rgba(109,40,217,.2);margin:0 3px 2px}
.ob-toc-p{font-size:7.5px;color:rgba(109,40,217,.45);font-family:var(--fm)}
.ob-st{font-size:8px;font-weight:700;color:#1e0a38;letter-spacing:.05em;text-transform:uppercase;margin:10px 0 5px}
.ob-body{font-size:8px;color:rgba(30,10,56,.6);line-height:1.56;margin-bottom:6px}
.ob-formula-box{margin:9px 0;padding:9px 8px;border-radius:4px;text-align:center;
  background:rgba(109,40,217,.08);border:1px solid rgba(109,40,217,.2)}
.ob-fml{font-size:12px;font-family:var(--fm);color:#1e0a38;font-weight:700;line-height:1.7}
.ob-fml-cap{font-size:6.5px;color:rgba(30,10,56,.42);margin-top:3px;font-family:var(--fm)}
.ob-corner{position:absolute;bottom:7px;right:9px;width:18px;height:18px;
  background:linear-gradient(225deg,rgba(109,40,217,.1) 38%,transparent 62%)}

/* ── PAGE TURN ANIMATION ── */
/* Overlay positioned absolute over the left page */
.ob-flip-layer{
  position:absolute;top:0;left:0;width:204px;height:286px;
  transform-origin:right center;
  transform-style:preserve-3d;
  z-index:20;pointer-events:none;
  animation:obFlip 12s 3s cubic-bezier(.645,.045,.355,.999) infinite}
@keyframes obFlip{
  0%,18%{transform:rotateY(0deg)}
  42%,58%{transform:rotateY(-180deg)}
  82%,100%{transform:rotateY(0deg)}
}
.ob-flip-front,.ob-flip-back{
  position:absolute;inset:0;padding:22px 18px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:3px 0 0 3px}
.ob-flip-front{
  background:linear-gradient(104deg,#f3eed8,#f8f4e6 60%,#f0ebe0);
  box-shadow:inset -8px 0 16px rgba(0,0,0,.1),-2px 0 8px rgba(0,0,0,.06)}
.ob-flip-back{
  background:linear-gradient(104deg,#f0ebe0,#f8f4e6 40%,#f3eed8);
  transform:rotateY(180deg);
  box-shadow:inset -8px 0 16px rgba(0,0,0,.1)}
/* Shadow that sweeps across during flip for realism */
.ob-flip-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to left,rgba(0,0,0,.12),transparent 60%);
  border-radius:inherit;pointer-events:none}

/* CODEX CONTENT SIDE */
.codex-info{display:flex;flex-direction:column;gap:20px}
.codex-vol-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;
  background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.26);border-radius:var(--rp);
  font-size:11px;font-weight:600;color:#a78bfa;font-family:var(--fm);width:fit-content}
.codex-main-title{font-size:clamp(28px,3.5vw,42px);font-weight:800;letter-spacing:-.038em;line-height:1.08}
.codex-main-title .acc{color:#a78bfa}
.codex-desc{font-size:14px;color:var(--t2);line-height:1.72;max-width:440px}
.codex-rule{height:1px;background:linear-gradient(to right,rgba(139,92,246,.3),transparent)}
.codex-ch-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.codex-chapters{display:flex;flex-direction:column;gap:3px}
.codex-ch{display:flex;align-items:center;gap:11px;padding:7px 10px;border-radius:8px;
  border:1px solid transparent;transition:all .18s;cursor:default}
.codex-ch:hover{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.18)}
.codex-ch-num{font-size:10px;font-family:var(--fm);color:#7c3aed;font-weight:700;min-width:22px}
.codex-ch-name{font-size:13px;color:var(--t2);font-weight:500;flex:1;transition:color .15s}
.codex-ch:hover .codex-ch-name{color:var(--t)}
.codex-ch-probs{font-size:10px;color:var(--t3);font-family:var(--fm)}
.codex-stats-row{display:flex;gap:24px;flex-wrap:wrap}
.codex-stat-v{font-size:24px;font-weight:800;font-family:var(--fm);letter-spacing:-.03em}
.codex-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-top:1px}
.codex-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-codex{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;border-radius:var(--r);
  font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
  box-shadow:0 4px 20px rgba(124,58,237,.32);transition:all .22s}
.btn-codex:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.48)}
.btn-codex-out{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;border-radius:var(--r);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;
  background:var(--card);color:var(--t2);border:1px solid var(--b2);transition:all .2s}
.btn-codex-out:hover{color:var(--t);background:var(--hover);transform:translateY(-1px)}

@media(max-width:960px){.codex-grid{grid-template-columns:1fr;gap:48px}}
@media(max-width:620px){.ob-stage{display:none}}
/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s cubic-bezier(.23,1,.32,1)}
.reveal.in{opacity:1;transform:translateY(0)}
.rd1{transition-delay:.07s}.rd2{transition-delay:.14s}.rd3{transition-delay:.21s}.rd4{transition-delay:.28s}

<script>
/* BG PARTICLE CANVAS */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d'),W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];
    var n=Math.min(60,Math.floor(W*H/14000));
    for(var i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.19,vy:(Math.random()-.5)*.19,r:Math.random()*1.4+.5,ph:Math.random()*Math.PI*2});
  }
  function ac(){return document.documentElement.getAttribute('data-theme')==='light'?'26,109,224':'59,158,255'}
  function frame(ts){
    ctx.clearRect(0,0,W,H);var col=ac();
    pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<-60)p.x=W+60;if(p.x>W+60)p.x=-60;if(p.y<-60)p.y=H+60;if(p.y>H+60)p.y=-60;});
    for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){
      var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<145){ctx.beginPath();ctx.strokeStyle='rgba('+col+','+(1-d/145)*.06+')';ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
    }
    pts.forEach(function(p){var pv=.7+.3*Math.sin(ts*.0008+p.ph);ctx.beginPath();ctx.arc(p.x,p.y,p.r*pv,0,Math.PI*2);ctx.fillStyle='rgba('+col+','+.22*pv+')';ctx.fill();});
    requestAnimationFrame(frame);
  }
  resize();window.addEventListener('resize',resize);requestAnimationFrame(frame);
})();

/* CURSOR GLOW + MOUSE PARALLAX + NAV SCROLL */
(function(){
  var g=document.getElementById('cursor-glow'),cx=-500,cy=-500,tx=-500,ty=-500;
  document.addEventListener('mousemove',function(e){
    tx=e.clientX;ty=e.clientY;
    var px=(e.clientX/innerWidth-.5)*2,py=(e.clientY/innerHeight-.5)*2;
    document.querySelectorAll('[data-d]').forEach(function(el){
      var d=parseFloat(el.getAttribute('data-d'));
      el.style.transform='translate('+(px*d*16)+'px,'+(py*d*10)+'px)';
    });
  });
  (function anim(){cx+=(tx-cx)*.09;cy+=(ty-cy)*.09;g.style.left=cx+'px';g.style.top=cy+'px';requestAnimationFrame(anim);})();
  window.addEventListener('scroll',function(){document.querySelector('.nav').classList.toggle('scrolled',scrollY>10);},{ passive:true });
})();
</script>

function use3DTilt(){
  const ref=useRef(null);
  const onMove=useCallback(e=>{
    const el=ref.current;if(!el)return;
    const r=el.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*2;
    const y=((e.clientY-r.top)/r.height-.5)*2;
    const color=el.dataset.tc||'rgba(59,158,255,0.3)';
    el.style.transform=`perspective(560px) rotateX(${-y*6}deg) rotateY(${x*4.5}deg) translateZ(8px) scale(1.015)`;
    el.style.boxShadow=`${-x*12}px ${6+y*4}px 32px rgba(0,0,0,.44),0 0 0 1px ${color}44`;
  },[]);
  const onLeave=useCallback(()=>{
    const el=ref.current;if(!el)return;
    el.style.transform='';el.style.boxShadow='';
  },[]);
  return{ref,onMouseMove:onMove,onMouseLeave:onLeave};
}

function useCountUp(target,dur=1600){
  const[val,setVal]=useState(0);
  const ref=useRef(null);
  const done=useRef(false);
  useEffect(()=>{
    const io=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting||done.current)return;
      done.current=true;io.disconnect();
      const t0=performance.now();
      const tick=now=>{const t=Math.min((now-t0)/dur,1),ease=1-(1-t)**3;setVal(Math.round(ease*target));if(t<1)requestAnimationFrame(tick);};
      requestAnimationFrame(tick);
    },{threshold:.5});
    if(ref.current)io.observe(ref.current);
    return()=>io.disconnect();
  },[target,dur]);
  return{val,ref};
}

                <div className="ob-ph">Chapter 04</div>
                <div className="ob-st">Polygons</div>
                <div className="ob-body">A polygon is a plane figure bounded by straight edges. Its signed area is computed with the Shoelace formula:</div>
                <div className="ob-formula-box">
                  <div className="ob-fml">A = ½|Σ(xᵢyᵢ₊₁ − xᵢ₊₁yᵢ)|</div>

function App(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('dsam-theme')!=='light'}catch{return true}});
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    try{localStorage.setItem('dsam-theme',dark?'dark':'light')}catch{}
  },[dark]);
  useEffect(()=>{
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
    },{threshold:.08});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
  return(
    <>
      <Nav dark={dark} setDark={setDark}/>
      <Hero/>
      <Marquee/>
      <Stats/>
      <div className="sep"/>
      <Topics/>
      <div className="sep"/>
      <Codex/>
      <div className="sep"/>
      <Features/>
      <CTA/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
