        - heading "4. PATTERN ANALYSIS" [level=3] [ref=e287]
        - 'heading "Pattern 1: Grid Traversal for Shape Detection" [level=4] [ref=e288]'
        - list [ref=e289]:
          - listitem [ref=e290]:
            - strong [ref=e291]: "When to use:"
            - text: Matrix/grid with 0/1s; need to identify or count shapes
          - listitem [ref=e292]:
            - strong [ref=e293]: "Why it works:"
            - text: BFS/DFS from each unvisited 1-cell collects all connected cells forming the shape
          - listitem [ref=e294]:
            - strong [ref=e295]: "Complexity:"
            - text: O(m * n) time, O(m * n) space
          - listitem [ref=e296]:
            - strong [ref=e297]: "Common mistake:"
            - text: Forgetting that diagonal connections in some problems don't count as connected (4-directional vs 8-directional)
        - 'heading "Pattern 2: Shape Normalization for Comparison" [level=4] [ref=e298]'
        - list [ref=e299]:
          - listitem [ref=e300]:
            - strong [ref=e301]: "When to use:"
            - text: Two shapes need to be compared for rotational/translational equality
          - listitem [ref=e302]:
            - strong [ref=e303]: "Why it works:"
            - text: By normalizing to a canonical position, equivalent shapes produce identical representations
          - listitem [ref=e304]:
            - strong [ref=e305]: "Complexity:"
            - text: O(k) where k is the number of cells in the shape
          - listitem [ref=e306]:
            - strong [ref=e307]: "Common mistake:"
            - text: Not generating all rotations — a shape may match after 90, 180, 270 degrees
        - 'heading "Pattern 3: Perimeter via Neighbor Counting" [level=4] [ref=e308]'
        - list [ref=e309]:
          - listitem [ref=e310]:
            - strong [ref=e311]: "When to use:"
            - text: Need the perimeter of a shape formed by 1s in a binary matrix
          - listitem [ref=e312]:
            - strong [ref=e313]: "Why it works:"
            - text: Each 1-cell contributes 4 - (number of 1-neighbors) to the perimeter
          - listitem [ref=e314]:
            - strong [ref=e315]: "Complexity:"
            - text: O(m * n)
          - listitem [ref=e316]:
            - strong [ref=e317]: "Common mistake:"
            - text: Only checking 4 directions, not 8 (depends on problem definition)
        - 'heading "Pattern 4: Bounding Box Analysis" [level=4] [ref=e318]'
        - list [ref=e319]:
          - listitem [ref=e320]:
            - strong [ref=e321]: "When to use:"
            - text: Need to enclose a shape, check alignment, or detect rectangles
          - listitem [ref=e322]:
            - strong [ref=e323]: "Why it works:"
            - text: The min/max row and column of shape cells define the tightest enclosing rectangle
          - listitem [ref=e324]:
            - strong [ref=e325]: "Complexity:"
            - text: O(m * n) to find boundaries
          - listitem [ref=e326]:
            - strong [ref=e327]: "Common mistake:"
            - text: Assuming the shape is aligned with grid axes
