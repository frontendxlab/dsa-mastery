        - heading "4. PATTERN ANALYSIS" [level=3] [ref=e465]
        - 'heading "Pattern 1: Grid Traversal for Shape Detection" [level=4] [ref=e466]'
        - list [ref=e467]:
          - listitem [ref=e468]:
            - strong [ref=e469]: "When to use:"
            - text: Matrix/grid with 0/1s; need to identify or count shapes
          - listitem [ref=e470]:
            - strong [ref=e471]: "Why it works:"
            - text: BFS/DFS from each unvisited 1-cell collects all connected cells forming the shape
          - listitem [ref=e472]:
            - strong [ref=e473]: "Complexity:"
            - text: O(m * n) time, O(m * n) space
          - listitem [ref=e474]:
            - strong [ref=e475]: "Common mistake:"
            - text: Forgetting that diagonal connections in some problems don't count as connected (4-directional vs 8-directional)
        - 'heading "Pattern 2: Shape Normalization for Comparison" [level=4] [ref=e476]'
        - list [ref=e477]:
          - listitem [ref=e478]:
            - strong [ref=e479]: "When to use:"
            - text: Two shapes need to be compared for rotational/translational equality
          - listitem [ref=e480]:
            - strong [ref=e481]: "Why it works:"
            - text: By normalizing to a canonical position, equivalent shapes produce identical representations
          - listitem [ref=e482]:
            - strong [ref=e483]: "Complexity:"
            - text: O(k) where k is the number of cells in the shape
          - listitem [ref=e484]:
            - strong [ref=e485]: "Common mistake:"
            - text: Not generating all rotations — a shape may match after 90, 180, 270 degrees
        - 'heading "Pattern 3: Perimeter via Neighbor Counting" [level=4] [ref=e486]'
        - list [ref=e487]:
          - listitem [ref=e488]:
            - strong [ref=e489]: "When to use:"
            - text: Need the perimeter of a shape formed by 1s in a binary matrix
          - listitem [ref=e490]:
            - strong [ref=e491]: "Why it works:"
            - text: Each 1-cell contributes 4 - (number of 1-neighbors) to the perimeter
          - listitem [ref=e492]:
            - strong [ref=e493]: "Complexity:"
            - text: O(m * n)
          - listitem [ref=e494]:
            - strong [ref=e495]: "Common mistake:"
            - text: Only checking 4 directions, not 8 (depends on problem definition)
        - 'heading "Pattern 4: Bounding Box Analysis" [level=4] [ref=e496]'
        - list [ref=e497]:
          - listitem [ref=e498]:
            - strong [ref=e499]: "When to use:"
            - text: Need to enclose a shape, check alignment, or detect rectangles
          - listitem [ref=e500]:
            - strong [ref=e501]: "Why it works:"
            - text: The min/max row and column of shape cells define the tightest enclosing rectangle
          - listitem [ref=e502]:
            - strong [ref=e503]: "Complexity:"
            - text: O(m * n) to find boundaries
          - listitem [ref=e504]:
            - strong [ref=e505]: "Common mistake:"
            - text: Assuming the shape is aligned with grid axes
