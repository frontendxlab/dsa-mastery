<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn DSA — DSA Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
:root{
  --f:'Inter',system-ui,-apple-system,sans-serif;
  --fm:'JetBrains Mono',ui-monospace,monospace;
  --bg:#090a0e; --bg2:#0d0f19; --card:#111420; --hover:#181a2c;
  --nav-bg:rgba(9,10,14,0.86);
  --b:rgba(214,235,253,0.08); --b2:rgba(214,235,253,0.16);
  --t:#e8eaf0; --t2:#7d8299; --t3:rgba(232,234,240,0.36);
  --a:#3b9eff; --a-bg:rgba(59,158,255,0.10); --a-bdr:rgba(59,158,255,0.22); --a-glow:rgba(59,158,255,0.14);
  --easy:#34d399; --easy-bg:rgba(52,211,153,0.10);
  --med:#fbbf24; --med-bg:rgba(251,191,36,0.10);
  --hard:#f87171; --hard-bg:rgba(248,113,113,0.10);
  --sh:0 1px 3px rgba(0,0,0,.3),0 0 0 1px var(--b);
  --r:8px; --rl:12px; --rp:9999px;
}
:root[data-theme="light"]{
  --bg:#fafbff; --bg2:#f3f5fb; --card:#ffffff; --hover:#edf0f8;
  --nav-bg:rgba(250,251,255,0.90);
  --b:rgba(0,0,51,0.07); --b2:rgba(0,0,51,0.14);
  --t:#0e0f14; --t2:#4b4f63; --t3:rgba(14,15,20,.40);
  --a:#1a6de0; --a-bg:rgba(26,109,224,0.08); --a-bdr:rgba(26,109,224,0.22); --a-glow:rgba(26,109,224,0.10);
  --easy:#059669; --easy-bg:rgba(5,150,105,0.10);
  --med:#d97706; --med-bg:rgba(217,119,6,0.10);
  --hard:#dc2626; --hard-bg:rgba(220,38,38,0.10);
  --sh:0 1px 3px rgba(0,0,0,.06),0 0 0 1px var(--b);
}
body{font-family:var(--f);background:var(--bg);color:var(--t);line-height:1.6;min-height:100vh}
.w{max-width:1200px;margin:0 auto;padding:0 24px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;background:none;border:none;font-family:inherit;color:inherit}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:var(--nav-bg);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--b)}
.nav-inner{height:100%;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-mark{display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--a);color:#fff;font-size:11px;font-weight:700;border-radius:7px;font-family:var(--fm);letter-spacing:-.5px;flex-shrink:0}
.logo-mark.sm{width:22px;height:22px;font-size:9px;border-radius:5px}
.logo-name{font-size:14px;font-weight:600;color:var(--t);letter-spacing:-.3px}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{padding:5px 12px;border-radius:6px;font-size:14px;font-weight:500;color:var(--t2);transition:all .15s}
.nav-link:hover{background:var(--hover);color:var(--t)}
.nav-link.act{background:var(--a-bg);color:var(--a)}
.nav-end{display:flex;align-items:center;gap:4px;margin-left:auto}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r);color:var(--t2);transition:all .15s}
.icon-btn:hover{background:var(--hover);color:var(--t)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;text-decoration:none;border:none;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--a);color:#fff}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--t);border:1px solid var(--b2)}
.btn-outline:hover{background:var(--hover)}

/* PAGE LAYOUT */
.page{padding-top:100px;padding-bottom:80px}

/* COURSE HERO */
.course-hero{padding:52px 0 56px;border-bottom:1px solid var(--b)}
.course-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--a-bg);border:1px solid var(--a-bdr);border-radius:var(--rp);font-size:11px;font-weight:600;color:var(--a);letter-spacing:.04em;text-transform:uppercase;margin-bottom:20px}
.course-title{font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-.04em;line-height:1.08;color:var(--t);margin-bottom:14px}
.course-subtitle{font-size:16px;color:var(--t2);max-width:540px;line-height:1.65;margin-bottom:28px}
.course-meta{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.course-stat{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--t2)}
.course-stat-val{font-weight:600;color:var(--t)}
.course-stat-sep{width:3px;height:3px;border-radius:50%;background:var(--b2)}
.progress-summary{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);margin-top:24px;max-width:480px}
.progress-bar-wrap{flex:1;height:4px;background:var(--b2);border-radius:var(--rp);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--a);border-radius:var(--rp);transition:width .4s ease}
.progress-text{font-size:12px;color:var(--t2);white-space:nowrap;font-weight:500}
.progress-pct{font-size:12px;font-weight:700;color:var(--a);white-space:nowrap;font-family:var(--fm)}

/* QUICK LINKS */
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.quick-link{padding:6px 14px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);transition:all .15s;cursor:pointer}
.quick-link:hover{border-color:var(--b2);color:var(--t);background:var(--hover)}

/* PARTS */
.parts-list{display:flex;flex-direction:column;gap:0;margin-top:48px}

.part-section{border:1px solid var(--b);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.part-section+.part-section{margin-top:10px}
.part-section:hover{border-color:var(--b2)}

.part-header{padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;user-select:none;background:var(--card);transition:background .15s}
.part-header:hover{background:var(--hover)}
.part-number{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);flex-shrink:0;width:56px}
.part-title-col{flex:1;min-width:0}
.part-title{font-size:15px;font-weight:600;color:var(--t);letter-spacing:-.01em}
.part-count{font-size:13px;color:var(--t2);margin-top:1px}
.part-progress-mini{display:flex;align-items:center;gap:10px;flex-shrink:0}
.part-bar{width:80px;height:3px;background:var(--b2);border-radius:var(--rp);overflow:hidden;flex-shrink:0}
.part-bar-fill{height:100%;background:var(--a);border-radius:var(--rp);transition:width .4s ease}
.part-pct{font-size:11px;font-weight:600;color:var(--t3);font-family:var(--fm);width:30px;text-align:right;flex-shrink:0}
.part-chevron{color:var(--t3);transition:transform .2s ease;flex-shrink:0;display:flex;align-items:center;margin-left:8px}
.part-chevron.open{transform:rotate(180deg)}

.part-chapters{background:var(--bg2);border-top:1px solid var(--b)}
.chapter-row{display:flex;align-items:center;gap:14px;padding:11px 24px;border-bottom:1px solid var(--b);transition:background .15s;cursor:pointer;position:relative}
.chapter-row:last-child{border-bottom:none}
.chapter-row:hover{background:var(--hover)}
.chapter-row:hover .chapter-open{opacity:1}
.chapter-check{width:18px;height:18px;border-radius:4px;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.chapter-check.done{background:var(--a);border-color:var(--a)}
.chapter-check.done svg{opacity:1}
.chapter-check svg{opacity:0;transition:opacity .15s}
.chapter-num{font-size:11px;font-weight:600;color:var(--t3);font-family:var(--fm);width:28px;flex-shrink:0;text-align:right}
.chapter-emoji{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.chapter-info{flex:1;min-width:0}
.chapter-title{font-size:14px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.chapter-row:hover .chapter-title{color:var(--a)}
.chapter-desc{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chapter-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.diff-badge{padding:2px 7px;border-radius:var(--rp);font-size:11px;font-weight:600;font-family:var(--fm)}
.diff-easy{color:var(--easy);background:var(--easy-bg)}
.diff-med{color:var(--med);background:var(--med-bg)}
.diff-hard{color:var(--hard);background:var(--hard-bg)}
.time-badge{font-size:11px;color:var(--t3);font-family:var(--fm);white-space:nowrap}
.chapter-open{opacity:0;transition:opacity .15s;color:var(--t3);margin-left:4px;flex-shrink:0}

/* FOOTER */
.footer{border-top:1px solid var(--b);padding:40px 0 28px;margin-top:80px}
.footer-bottom-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t3)}
.footer-gh{color:var(--t2);display:flex;transition:color .15s}.footer-gh:hover{color:var(--t)}

@media(max-width:700px){.part-progress-mini{display:none}.chapter-desc{display:none}.nav-links{display:none}}
</style>
</head>

  ]},
];

const GH = () => (
  <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.164 6.839 9.489.5.09.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.745 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
  </svg>
);
const Sun = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
const Moon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
const Check = () => <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="2,6 5,9 10,3"/></svg>;
const Chevron = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>;
const ArrowRight = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

function Nav({ dark, setDark }) {
  return (
    <nav className="nav">
      <div className="nav-inner w">
        <a href="Landing.html" className="logo">
          <span className="logo-mark">fx</span>
          <span className="logo-name">DSA Mastery</span>
        </a>
        <div className="nav-links">
          <a href="Learn.html" className="nav-link act">Learn</a>
          <a href="Explore.html" className="nav-link">Explore</a>
          <a href="#" className="nav-link">Patterns</a>
        </div>
        <div className="nav-end">
          <a href="https://github.com/rashidtvmr/dsa-inventory" className="icon-btn" target="_blank" rel="noreferrer"><GH /></a>
          <button className="icon-btn" onClick={() => setDark(d => !d)}>{dark ? <Sun /> : <Moon />}</button>
        </div>
      </div>
    </nav>
  );
}

function PartSection({ part, done, onToggle }) {
  const [open, setOpen] = useState(part.num === 'I');
  const doneCount = part.chapters.filter(c => done.has(c.n)).length;
  const pct = Math.round((doneCount / part.chapters.length) * 100);

  return (
    <div className="part-section">
      <div className="part-header" onClick={() => setOpen(o => !o)}>
        <span className="part-number">Part {part.num}</span>
        <div className="part-title-col">
          <div className="part-title">{part.title}</div>
          <div className="part-count">{part.chapters.length} chapters</div>
        </div>
        <div className="part-progress-mini">
          <div className="part-bar"><div className="part-bar-fill" style={{width:`${pct}%`, background: part.color}} /></div>
          <span className="part-pct">{pct}%</span>
        </div>
        <span className={`part-chevron${open ? ' open' : ''}`}><Chevron /></span>
      </div>
      {open && (
        <div className="part-chapters">
          {part.chapters.map(ch => {
            const isDone = done.has(ch.n);
            return (
              <a key={ch.n} href="Article.html" className="chapter-row">
                <div
                  className={`chapter-check${isDone ? ' done' : ''}`}
                  style={isDone ? {} : {}}
                  onClick={e => { e.preventDefault(); onToggle(ch.n); }}
                >
                  <Check />
                </div>
                <span className="chapter-num">{ch.n}</span>
                <span className="chapter-emoji">{ch.e}</span>
                <div className="chapter-info">
                  <div className="chapter-title">{ch.t}</div>
                  <div className="chapter-desc">{ch.d}</div>
                </div>
                <div className="chapter-meta">
                  <span className={`diff-badge diff-${ch.diff}`}>{ch.diff === 'easy' ? 'Easy' : ch.diff === 'med' ? 'Med' : 'Hard'}</span>
                  <span className="time-badge">{ch.min} min</span>
                </div>
                <span className="chapter-open"><ArrowRight /></span>
              </a>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [dark, setDark] = useState(() => {
    try { return localStorage.getItem('dsam-theme') !== 'light'; } catch { return true; }
  });
  const [done, setDone] = useState(() => {
    try {
      const saved = localStorage.getItem('dsam-done');
      return new Set(saved ? JSON.parse(saved) : [1, 2, 3, 13]);
    } catch { return new Set([1, 2, 3, 13]); }
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    try { localStorage.setItem('dsam-theme', dark ? 'dark' : 'light'); } catch {}
  }, [dark]);

  const toggleDone = useCallback((n) => {
    setDone(prev => {
      const next = new Set(prev);
      next.has(n) ? next.delete(n) : next.add(n);
      try { localStorage.setItem('dsam-done', JSON.stringify([...next])); } catch {}
      return next;
    });
  }, []);

  const total = PARTS.reduce((a, p) => a + p.chapters.length, 0);
  const totalDone = PARTS.reduce((a, p) => a + p.chapters.filter(c => done.has(c.n)).length, 0);
  const overallPct = Math.round((totalDone / total) * 100);

  return (
    <>
      <Nav dark={dark} setDark={setDark} />
      <div className="page">
        <div className="w">
          {/* HERO */}
          <div className="course-hero">
            <div className="course-tag">DSA Course — Complete Textbook</div>
            <h1 className="course-title">Mastering DSA<br /><span style={{color:'var(--t3)'}}>Through Patterns</span></h1>
            <p className="course-subtitle">8 parts · 170 chapters · 38k+ practice problems. Each chapter: brute force first, then the insight, then the optimal.</p>
            <div className="course-meta">
              {[{v:'8',l:'Parts'},{v:'170',l:'Chapters'},{v:'38k+',l:'Problems'},{v:total,l:'Total lessons'}].map((s,i) => (
                <React.Fragment key={s.l}>
                  {i>0 && <span className="course-stat-sep" />}
                  <span className="course-stat"><span className="course-stat-val">{s.v}</span> {s.l}</span>
                </React.Fragment>
              ))}
            </div>
            <div className="progress-summary">
              <div className="progress-bar-wrap">
                <div className="progress-bar-fill" style={{width:`${overallPct}%`}} />
              </div>
              <span className="progress-text">{totalDone} / {total} chapters</span>
              <span className="progress-pct">{overallPct}%</span>
            </div>
            <div style={{display:'flex',gap:12,marginTop:20,flexWrap:'wrap'}}>
              <a href="Article.html" className="btn btn-primary">Continue Reading →</a>
              <a href="#" className="btn btn-outline">Patterns Cheat Sheet</a>
            </div>
          </div>

          {/* QUICK JUMP */}
          <div style={{margin:'32px 0 0'}}>
            <div style={{fontSize:12,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--t3)',marginBottom:10}}>Jump to Part</div>
            <div className="quick-links">
              {PARTS.map(p => (
                <span key={p.num} className="quick-link" onClick={() => document.querySelector(`[data-part="${p.num}"]`)?.scrollIntoView()}>
                  {p.num} — {p.title}
                </span>
              ))}
            </div>
          </div>

          {/* PARTS */}
          <div className="parts-list">
            {PARTS.map(p => (
              <div key={p.num} data-part={p.num}>
                <PartSection part={p} done={done} onToggle={toggleDone} />
              </div>
            ))}
          </div>

          {/* COMING SOON */}
          <div style={{marginTop:16,padding:'20px 24px',background:'var(--card)',border:'1px solid var(--b)',borderRadius:'var(--rl)',textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--t)',marginBottom:4}}>More chapters coming</div>
            <div style={{fontSize:13,color:'var(--t2)'}}>Segment Trees, Network Flow, Number Theory deep dives — next up.</div>
          </div>
        </div>
      </div>

      <footer className="footer">
        <div className="w footer-bottom-row">
          <span>© 2026 frontendx. Built for DSA practice.</span>
          <a href="https://github.com/rashidtvmr/dsa-inventory" target="_blank" rel="noreferrer" className="footer-gh"><GH /></a>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
